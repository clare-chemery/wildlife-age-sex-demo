# Complete Example Configuration File for Wildlife Age/Sex Classification Pipeline
# This file contains ALL possible configuration parameters with their default values
# and detailed comments explaining each parameter's purpose and usage.
#
# To learn more about TOML syntax, see https://toml.io/en/

# =============================================================================
# GLOBAL CONFIGURATION
# =============================================================================
[globals]
# Working directory - all other paths are relative to this directory
# Can be absolute path or relative path from where you execute the pipeline
working_dir = "."

# Target column in your dataset to predict (e.g., "sex", "age", "species")
# This is the label column that your model will learn to predict
target_column = "sex"

# List of possible classes/labels in your target column
# Order matters - this defines the class indices for model training
# Common examples:
#   Sex: ["male", "female", "unknown"]
#   Age: ["yearling", "juvenile", "adult", "unknown"]
#   Species: ["deer", "elk", "bear", "unknown"]
classes = ["male", "female", "unknown"]

# =============================================================================
# INPUT/OUTPUT CONFIGURATION
# =============================================================================
[io]
    # Data file paths - all paths relative to working_dir
    [io.data] # REQUIRED SECTION
    
    # Input parquet file containing image data, bounding boxes, labels, and metadata
    # Must contain columns: image_id, image, confidence, bbox, and your target column
    raw_data_filepath = "data/raw/labeled_bbox_data.parquet"
    
    # Output location for preprocessed data (cropped, filtered images)
    # Generated by preprocess.py, used by train.py and evaluate.py
    preprocessed_data_filepath = "data/preprocessed/preprocessed_data.parquet"
    
    ## NOTE:
    ## If you are running multiple experiments, make sure the train, test, and model
    ## directories are different for each experiment.

    # Training set after train/test split - generated by train.py
    train_filepath = "data/splits/train.parquet"
    
    # Test set after train/test split - generated by train.py, used by evaluate.py
    test_filepath = "data/splits/test.parquet"

    # Model storage paths
    [io.model] # REQUIRED SECTION
    
    # Directory to save trained model files and training specifications
    # Will contain: model.pt (trained model) and tuning_specs.json (training metadata)
    model_dir = "models/example_model"

# =============================================================================
# PREPROCESSING CONFIGURATION
# =============================================================================
[preprocess] # OPTIONAL SECTION - uses defaults if omitted

# Minimum confidence threshold for bounding box detections
# Images with detection confidence below this value are excluded from dataset
# Range: 0.0 to 1.0 (higher = more selective, fewer but higher quality images)
# Typical values: 0.3-0.5 (lenient), 0.8-0.95 (strict)
confidence_threshold = 0.8

# Image cropping strategy for bounding box regions
# "shift": Try to create square crop by shifting bbox, pad if needed (recommended)
# "pad": Create square crop by padding with zeros around original bbox
cropping_mode = "shift"

# Target image size after preprocessing [width, height]
# Standard sizes: [224, 224] (most models), [299, 299] (Inception), [384, 384] (high-res)
# Larger sizes may improve accuracy but increase memory usage and training time
rescale_to = [224, 224]

# =============================================================================
# TRAINING CONFIGURATION
# =============================================================================
[train] # REQUIRED SECTION

# Data splitting and stratification
# Column to stratify train/test split by (ensures balanced representation)
# Common options: target column name (e.g., "sex", "age"), metadata column (e.g., "season", "location")
# Set to null or comment out for random split without stratification
stratify_by = "sex"

# Model architecture selection
# Pretrained model backbone to use for transfer learning
# Available options: "resnet50", "vgg19", "densenet161", "densenet201"
# Or provide path to custom pretrained model file (.pt/.pth)
# resnet50: Good balance of speed and accuracy, widely used
# densenet161/desnenet201: Often better accuracy, more memory intensive
# vgg19: Older architecture, good for interpretability
backbone_model = "resnet50"

# Training batch size - number of images processed simultaneously
# Larger batches: More stable gradients, faster training, more GPU memory
# Smaller batches: Less memory usage, may generalize better
# Typical values: 16-64 depending on GPU memory and image size
batch_size = 32

# Loss function for training
# "categorical_crossentropy": Multi-class classification (3+ classes)
# "binary_crossentropy": Binary classification (2 classes only)
loss_function = "categorical_crossentropy"

# Transfer learning phase parameters
# Number of epochs for transfer learning (training only classifier layers)
# Transfer learning fine-tunes the final classifier while keeping backbone frozen
# Typical values: 10-30 epochs
transfer_epochs = 10

# Learning rate for transfer learning phase
# Higher rates: Faster convergence, risk of overshooting optimal weights
# Lower rates: More stable training, slower convergence
# Typical values: 0.001-0.01
transfer_learning_rate = 0.01

# Optimizer for transfer learning phase
# "adam": Adaptive learning rate, good default choice
# "sgd": Stochastic gradient descent, often better for fine-tuning
transfer_optimizer = "adam"

# Early stopping patience for transfer learning
# Number of epochs to wait for improvement before stopping
# Higher values: More thorough training, longer runtime
# Lower values: Faster training, risk of premature stopping
transfer_patience = 10

# Fine-tuning phase parameters
# Number of epochs for fine-tuning (training classifier + some backbone layers)
# Fine-tuning unfreezes some backbone layers for task-specific adaptation
# Typical values: 10-50 epochs
finetune_epochs = 10

# Learning rate for fine-tuning phase
# Usually lower than transfer learning rate to avoid destroying pretrained features
# Typical values: 0.0001-0.001
finetune_learning_rate = 0.001

# Optimizer for fine-tuning phase
# "sgd": Often preferred for fine-tuning, more stable
# "adam": Can work well, may converge faster
finetune_optimizer = "adam"

# Number of backbone layers to unfreeze during fine-tuning
# More layers: More adaptation to your data, risk of overfitting
# Fewer layers: More conservative, preserves pretrained features
# Typical values: 1-5 layers
finetune_layers = 1

# Early stopping patience for fine-tuning
# Number of epochs to wait for improvement before stopping
finetune_patience = 10

# Metric to monitor for early stopping
# "val_loss": Validation loss (most common)
# Other options: "val_accuracy", "val_f1", etc.
earlystop_metric = "val_loss"

# System performance parameters
# Number of worker processes for data loading
# 0: Single-threaded loading (safe default)
# 2-8: Multi-threaded loading (faster but may cause issues on some systems)
num_workers = 0

# Computing device for training
# "cuda": Use GPU if available (much faster)
# "cpu": Use CPU only (slower but more compatible)
# "auto": Automatically detect best available device
device = "auto"

# Data augmentation parameters
# Augmentation strength level - affects how aggressively images are modified
# "light": Minimal augmentation (rotation, flip, slight color changes)
# "medium": Moderate augmentation (more rotation, color, some blur/noise) - DEFAULT
# "strong": Aggressive augmentation (strong transformations, quality simulation)
augmentation_strength = "medium"

# Enable quality-simulating augmentations (blur, noise, compression artifacts)
# true: Include realistic image quality variations (recommended for real-world robustness)
# false: Only standard geometric/color augmentations
enable_quality_simulation = true

# =============================================================================
# EVALUATION CONFIGURATION
# =============================================================================
[evaluate] # OPTIONAL SECTION - uses defaults if omitted

# Column to stratify evaluation results by
# Allows analysis of model performance across different subgroups
# Common options: "season", "location", "time_of_day", "is_summer", etc.
# Set to null or comment out for overall evaluation only
stratify_by = "season"

# Confidence threshold for predictions during evaluation
# Predictions below this threshold are considered "uncertain"
# Range: 0.0 to 1.0 (higher = more conservative uncertainty detection)
# Typical values: 0.5-0.8
confidence_threshold = 0.96

# Whether to exclude uncertain predictions from evaluation metrics
# true: Calculate metrics only on high-confidence predictions
# false: Include all predictions in metrics (but still track uncertain ones)
exclude_uncertain = false